# Build the rsdbc Trunk (WASM) site and deploy it to GitHub Pages.
name: Deploy rsdbc to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup | Rust (wasm target)
        run: rustup target add wasm32-unknown-unknown

      - name: Setup | Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Setup | cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Setup | trunk
        run: cargo binstall -y trunk

      - name: Setup | Pages
        id: pages
        uses: actions/configure-pages@v5

      # public-url makes assets resolve under the project subpath
      # (e.g. https://<user>.github.io/<repo>/).
      - name: Build | Trunk
        run: trunk build --release --public-url "${{ steps.pages.outputs.base_path }}/"

      - name: Build | Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
